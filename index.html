<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavNooob Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🎮</span>
                    <span class="logo-text">FavNooob</span>
                </div>
                <span class="logo-subtitle">Dashboard</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="chatters">
                    <span class="nav-icon">🏆</span>
                    <span class="nav-label">Top Chatters</span>
                </a>
                <a href="#" class="nav-item" data-page="battlepass">
                    <span class="nav-icon">🎖️</span>
                    <span class="nav-label">Pase de Batalla</span>
                </a>
                <a href="#" class="nav-item" data-page="giveaways">
                    <span class="nav-icon">🎁</span>
                    <span class="nav-label">Sorteos</span>
                </a>
                <a href="#" class="nav-item" data-page="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">Chat en Vivo</span>
                </a>
                <a href="#" class="nav-item" data-page="polls">
                    <span class="nav-icon">🗳️</span>
                    <span class="nav-label">Encuestas</span>
                </a>
                <a href="#" class="nav-item" data-page="goals">
                    <span class="nav-icon">🎯</span>
                    <span class="nav-label">Objetivos</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Configuración</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="admin-badge" id="adminBadge">
                    <span class="badge-dot"></span>
                    <span class="badge-text">Admin Mode</span>
                </div>
                <div class="sidebar-credit">Desarrollado por ElMarcels</div>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <header class="topbar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="topbar-title" id="pageTitle">Dashboard</div>
                <div class="topbar-actions">
                    <div class="stream-status" id="streamStatus">
                        <span class="status-dot offline"></span>
                        <span class="status-text">Offline</span>
                    </div>
                    <button class="btn btn-sm btn-outline" id="loginBtn">🔑 Identificarse</button>
                </div>
            </header>

            <div class="page-content" id="pageContent">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle"></h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://github.com/tmijs/tmi.js/releases/download/v1.8.5/tmi.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chatters.js"></script>
    <script src="js/giveaways.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/battlepass.js"></script>
    <script src="js/polls.js"></script>
    <script src="js/goals.js"></script>
    <script src="js/alerts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
